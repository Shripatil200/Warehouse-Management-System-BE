spring:
  application:
    name: warehouse

  # Database Configuration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA & Hibernate Settings
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

        # ❌ DISABLED FOR MULTI-TENANT SAFETY
        cache:
          use_second_level_cache: false
          use_query_cache: false

  # Mail Server Configuration (Gmail)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Redis Infrastructure (keep, but not used for Hibernate cache now)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}



# Custom Application Properties
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}
  frontend:
    url: ${APP_FRONTEND_URL}
  sms:
    api:
      key: ${SMS_API_KEY}
  jwt:
    secret: ${JWT_SECRET_KEY:zdtlY0p3YjVxOHYvYj9FKEgrS2JQZVNnSmtWbk9xM3Q2dzl6JEMmRikpSk1OalFmVGpXbiZyNHU3eCF6JUMqRg==}

# Logging Configuration
logging:
  level:
    com.infotact.warehouse: DEBUG          # 👈 your logs (TenantFilter, services)
    org.hibernate.SQL: DEBUG               # 👈 SQL queries
    org.hibernate.orm.jdbc.bind: TRACE     # 👈 query parameters (CRITICAL)
    org.springframework.security: INFO