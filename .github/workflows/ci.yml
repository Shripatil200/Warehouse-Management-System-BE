name: WMS CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Run Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: wms_test
          POSTGRES_USER: wms_user
          POSTGRES_PASSWORD: wms_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/wms_test
      DB_USERNAME: wms_user
      DB_PASSWORD: wms_pass
      JWT_SECRET_KEY: dGVzdC1zZWNyZXQta2V5LWZvci1jaS10ZXN0aW5nLW9ubHktbm90LWZvci1wcm9k
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_SSL_ENABLED: "false"
      SMTP_USER: test@example.com
      SMTP_PASS: test
      SMS_API_KEY: test-key
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
      APP_FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Validate Maven wrapper
        run: mvn --version

      - name: Run unit tests
        run: mvn clean test -Dspring.profiles.active=test

      - name: Build JAR (skip tests to avoid double run)
        run: mvn package -DskipTests

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7
