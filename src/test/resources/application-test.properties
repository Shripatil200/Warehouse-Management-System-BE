# ============================================================
# TEST PROFILE ? overrides application.yml for CI and local test runs
# ============================================================

# Database ? CI service env vars with local fallbacks
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/wms}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:0000}

# CRITICAL: create-drop builds the full schema from JPA entities on a blank DB.
# "validate" (the production setting) fails immediately on a fresh CI container.
spring.jpa.hibernate.ddl-auto=create-drop

# Suppress verbose SQL noise in CI output
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# JWT ? must match the key name in application.yml exactly (JWT_SECRET_KEY)
app.jwt.secret=${JWT_SECRET_KEY:dGVzdC1zZWNyZXQta2V5LWZvci1jaS10ZXN0aW5nLW9ubHktbm90LWZvci1wcm9k}

# Mail ? dummy values so context loads without a real SMTP server
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:test@example.com}
spring.mail.password=${SMTP_PASS:test}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}

# App custom properties
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}
app.sms.api.key=${SMS_API_KEY:test-key}

# Quiet logging in CI
logging.level.com.infotact.warehouse=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.springframework.security=WARN
