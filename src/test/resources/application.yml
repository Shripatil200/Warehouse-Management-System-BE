# Test-scope application.yml — placed in src/test/resources so it takes
# precedence over src/main/resources/application.yml during test runs only.
#
# Primary purpose: override ddl-auto to create-drop so Hibernate generates
# the full schema from JPA entities on the blank CI PostgreSQL container.
# This is the fallback that works regardless of which profile is active.

spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        cache:
          use_second_level_cache: false
          use_query_cache: false

  # Mail — prevent startup SMTP connection attempt
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:test@example.com}
    password: ${SMTP_PASS:test}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

app:
  jwt:
    secret: ${JWT_SECRET_KEY:dGVzdC1zZWNyZXQta2V5LWZvci1jaS10ZXN0aW5nLW9ubHktbm90LWZvci1wcm9k}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:3000}
  sms:
    api:
      key: ${SMS_API_KEY:test-key}

logging:
  level:
    com.infotact.warehouse: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.springframework.security: WARN
